name: validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  skills-discovery:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate skill discovery
        run: npx skills add . --list

      - name: Validate candidate scanner
        run: python3 skills/obsidian-clipping-repair/scripts/find_candidates.py . --format json > /tmp/obsidian-clipping-repair-candidates.json

      - name: Validate tag inventory scanner
        run: python3 skills/obsidian-vault-auto-tagger/scripts/vault_tag_inventory.py scan . --format json > /tmp/obsidian-vault-auto-tagger-scan.json
